schema_version: "1.0"
schema_id: source_record_v1
source_types:
  - quran
  - sahih_hadith
  - hasan_hadith
  - weak_hadith
  - tafsir
  - seerah
  - history
  - scholarly_opinion
  - modern_reference
validation_states:
  - unverified
  - under_review
  - verified
  - disputed
  - rejected
  - approved_for_narration
  - approved_for_visual_context
fields:
