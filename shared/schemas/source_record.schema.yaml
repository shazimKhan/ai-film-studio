  source_type: enum
  collection_name: string
  book: string
  chapter: string
  verse_number: string
  hadith_number: string
  arabic_text: string
  translation: string
  narrator: string
  authenticity_grade: string
  scholar: string
  publication: string
  url_or_reference: string
  retrieved_date: date
  notes: string
  disputed_status: string
  validation_state: enum
  confidence_level: enum
  approved_for_script: boolean
  approved_by: string
  approval_date: date
