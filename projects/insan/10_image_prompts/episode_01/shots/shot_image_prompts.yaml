schema_version: "1.0"
project_id: insan
episode_id: episode_01
status: image_prompts_pending_source_and_depiction_review
total_shot_prompts: 25
identity_locks:
  - character_id: storyteller
    identity_id: insan_storyteller_v1
    use_locked_identity: true
    reference_image:
      path: projects/insan/12_generated_images/episode_01/assets/storyteller_master.png
      filename: storyteller_master.png
      required: true
    identity_lock: strict
character_state_resolution:
  - character_id: iblis
    identity_id: insan_iblis_v1
    default_state: pre_rebellion
    rules:
      - state_id: pre_rebellion
        applies_to_shots:
          - insan_ep01_shot_005
          - insan_ep01_shot_006
          - insan_ep01_shot_015
          - insan_ep01_shot_016
          - insan_ep01_shot_017
          - insan_ep01_shot_019
      - state_id: post_expulsion
        applies_to_shots:
          - insan_ep01_shot_021
          - insan_ep01_shot_022
global_requirements:
  - no_visible_allah
  - no_throne_or_divine_body
  - no_generated_arabic_text
  - no_generated_quranic_text
  - adam_face_hidden
  - angel_faces_hidden
  - iblis_not_western_horned_devil
  - realistic_cinematic_documentary
provider_adaptation_rules:
  gemini: Use natural-language cinematic detail and preserve all negative constraints.
  flow: Favor clean subject lock, stable composition, and image-to-video readiness.
  veo_image_workflow: Produce a stable keyframe with clear motion affordance and no text.
  seedance_image_input_workflow: Use strong continuity locks and simple silhouette-safe composition.
  generic_cinematic_image_model: Use direct photographic language and avoid sacred-text generation.
prompts:
  - shot_id: insan_ep01_shot_001
    approval_status: ready_to_generate_subject_to_project_approval
    locked_asset_references:
      - storyteller
      - storyteller_studio
    reference_assets:
      - character_id: storyteller
        identity_id: insan_storyteller_v1
        path: projects/insan/12_generated_images/episode_01/assets/storyteller_master.png
        required: true
        identity_lock: strict
    master_prompt: >
      Medium close-up of the approved storyteller seated centered at the wooden
      desk in the approved storyteller studio. Pakistani Muslim male, 30-35,
      charcoal kurta, simple waistcoat, thoughtful face, neatly trimmed beard,
      composed brown eyes. Books on one side, MacBook on the other, no readable
      text. Front eye-level 50mm lens, slow-push-in keyframe, warm soft desk
      light, serious reflective atmosphere, realistic cinematic documentary.
    exact_scene_composition: storyteller centered at desk
    subject_placement: center_frame
    environment: storyteller_studio
    camera: medium_close_up_front_eye_level
    lens: 50mm
    lighting: warm_key_soft_shadow
    atmosphere: solemn_documentary
    visual_symbolism: human arrogance introduced through direct address
    continuity_instructions: keep wardrobe, desk layout, face, beard, and lighting consistent
    depiction_restrictions:
      - no_sacred_figure_depiction
      - no_readable_religious_text
    negative_prompt: readable text, Arabic text, Qur'anic text, distorted hands, plastic skin, fantasy costume
    provider_adaptations:
      gemini: Generate a highly realistic cinematic storyteller keyframe; preserve desk continuity and no readable text.
      flow: Create a stable talking-head keyframe with natural face proportions for later lip-sync.
      veo_image_workflow: Use as opening keyframe; leave room for subtle push-in and mouth movement.
      seedance_image_input_workflow: Keep face stable and centered, no text on screen.
      generic_cinematic_image_model: Photorealistic documentary studio portrait, warm light, no text.
