      - no_quranic_text_on_screen
    visual_description: Storyteller seated at desk in a solemn documentary studio.
    emotional_tone: serious_reflective
    transition_in: fade_from_black
    transition_out: slow_dissolve_to_darkness
    approval_status: needs_source_review
