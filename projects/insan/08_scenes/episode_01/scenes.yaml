  - scene_id: insan_ep01_scene_001
    title: Storyteller Opening Hook
    narrative_purpose: Connect modern human arrogance to the episode's moral frame.
    narration_block: nar_001
    narration_text: >
      Yeh kahani hai insan ki. Us insan ki jo kabhi apni taqat par itna fakhr
      karta hai ke kamzor ki aah sunai dena band ho jati hai. Jo zameen par
      akad kar chalta hai, jaise us ke qadam kabhi rukenge hi nahi. Magar
      takabbur ki yeh kahani insan se shuru nahi hui.
    source_refs:
      - user_instruction_2026_07_22
    duration_seconds: 24
    location: storyteller_studio
    required_assets:
