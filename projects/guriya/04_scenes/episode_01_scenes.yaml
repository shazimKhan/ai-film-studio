schema_version: "1.0"
episode_id: EP01
episode_title: Guriya
scene_policy:
  one_main_action_per_shot: true
  shot_duration_seconds:
    min: 4
    max: 8
  dialogue_separate_from_video_prompts: true
scenes:
  - scene_id: SC001
    stable_prefix: EP01_SC001
    title: Storyteller Opening
    location_id: narrator_studio
    time_of_day: night
    purpose: introduce_guriya
    characters:
      - storyteller
    emotional_intent: serious_and_compassionate
    summary: The storyteller opens the episode and frames Guriya's life with empathy.
    output_batch: ../05_shots/opening_batch.yaml
  - scene_id: SC002
    stable_prefix: EP01_SC002
    title: Guriya Sewing Late At Night
    location_id: guriya_family_home
    sublocation: modest_room
    time_of_day: late_night
    purpose: emotional_hook
    characters:
      - guriya
    props:
      - manual_sewing_machine
      - fabric
    emotional_intent: tired_but_determined
    summary: Guriya works quietly at a manual sewing machine while the room sleeps.
    output_batch: ../05_shots/opening_batch.yaml
  - scene_id: SC003
    stable_prefix: EP01_SC003
    title: Guriya Looks At Sleeping Children
    location_id: guriya_family_home
    sublocation: modest_room
    time_of_day: late_night
    purpose: reveal_concern_and_determination
    characters:
      - guriya
      - children_group
    emotional_intent: worried_but_resolute
    summary: Sleeping children become the emotional reason for Guriya's endurance.
